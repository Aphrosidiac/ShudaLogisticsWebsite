  >S</text>
  <!-- Subtle truck silhouette accent lines (top-right) -->
  <path d="M 310 95 Q 390 95 410 130 Q 430 165 430 130" stroke="rgba(255,255,255,0.25)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 330 80 Q 400 78 425 115" stroke="rgba(255,255,255,0.15)" stroke-width="4" fill="none" stroke-linecap="round"/>
